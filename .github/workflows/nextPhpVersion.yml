name: test with next PHP version

on:
  workflow_dispatch:

jobs:
  cache:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Get PHP version
        id: php-version
        run: |
          echo "PHP_VERSION=`jq -r '.config.nextPhp' composer.json`" >> $GITHUB_ENV
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
      - name: Restore Composer packages
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: composer-cache-${{ runner.os }}-${{ runner.arch }}-next-php-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-cache-${{ runner.os }}-${{ runner.arch }}-next-php-${{ hashFiles('composer.lock') }}
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Save Composer packages
        id: cache-composer
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: composer-cache-${{ runner.os }}-${{ runner.arch }}-next-php-${{ hashFiles('composer.lock') }}

  build:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build-next-php
      cancel-in-progress: true
    runs-on: ubuntu-24.04-arm
    needs: cache
    steps:
      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
#      - uses: dorny/paths-filter@v3
#        id: changes
#        with:
#          filters:
      - name: Check Docker Image Cache
        # uses: ScribeMD/docker-cache@0.5.0
        uses: AndreKurait/docker-cache@7a3887908bdb97935395833df69b060cfcca0f7f # 0.7.0
        id: docker-cache
        with:
          key: docker-${{ runner.os }}-${{ hashFiles('./.docker/compose.ci.yaml') }}
      - if: steps.docker-cache.outputs.cache-hit != 'true'
        name: Cache Docker Image
        run: task pullCiImages

  lint:
    runs-on: ubuntu-24.04-arm
    needs: cache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Restore Composer packages
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: composer-cache-${{ runner.os }}-${{ runner.arch }}-next-php-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-cache-${{ runner.os }}-${{ runner.arch }}-next-php-${{ hashFiles('composer.lock') }}
      - name: Get PHP version
        id: php-version
        run: |
          echo "PHP_VERSION=`jq -r '.config.nextPhp' composer.json`" >> $GITHUB_ENV
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress
      - name: Restore Rector cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tempCache/.rector
          key: rector-cache-${{ runner.os }}-${{ github.run_id }}-next-php
          restore-keys: |
            rector-cache-${{ runner.os }}-${{ github.run_id }}-next-php
      - name: Rector
        run: |
          composer rectorCheck
      - name: Cache .rector
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .tempCache/.rector
          key: rector-cache-${{ runner.os }}-${{ github.run_id }}-next-php
      - name: Restore Stan cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tempCache/.stan
          key: stan-cache-${{ runner.os }}-${{ github.run_id }}-next-php
          restore-keys: |
            stan-cache-${{ runner.os }}-${{ github.run_id }}-next-php
      - name: Stan
        run: |
          composer stanCheck
      - name: Cache .stan
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .tempCache/.stan
          key: stan-cache-${{ runner.os }}-${{ github.run_id }}-next-php
      - name: Restore Ecs cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tempCache/.ecs
          key: ecs-cache-${{ runner.os }}-${{ github.run_id }}-next-php
          restore-keys: |
            ecs-cache-${{ runner.os }}-${{ github.run_id }}-next-php
      - name: Ecs
        run: |
          composer ecsCheck
      - name: Cache .ecs
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .tempCache/.ecs
          key: ecs-cache-${{ runner.os }}-${{ github.run_id }}-next-php
  test:
    runs-on: ubuntu-24.04-arm
    needs: build
    steps:
      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Cache Docker images
        # uses: ScribeMD/docker-cache@0.5.0
        uses: AndreKurait/docker-cache@7a3887908bdb97935395833df69b060cfcca0f7f # 0.7.0
        with:
          key: docker-${{ runner.os }}-${{ hashFiles('./.docker/compose.ci.yaml') }}
      - name: Restore Composer packages
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: composer-cache-${{ runner.os }}-${{ runner.arch }}-next-php-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-cache-${{ runner.os }}-${{ runner.arch }}-next-php-${{ hashFiles('composer.lock') }}
      - name: Get PHP version
        id: php-version
        run: |
          echo "PHP_VERSION=`jq -r '.config.nextPhp' composer.json`" >> $GITHUB_ENV
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
      - name: Setup
        run: |
          cp .docker/local/php/.env.ci .env
          task upOnCI
      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress
      - name: test
        run: composer phpunit
