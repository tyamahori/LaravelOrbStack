name: laravelorbstack
x-common-settings: &healthcheck-settings
  interval: 1s
  timeout: 30s
  retries: 30
volumes:
  postgresql:
  mysql:
  cache:
  session:
  storage:
  caddy-data:
  caddy-config:

services:
  postgresql:
    networks:
      default:
        aliases:
          - laravelorbstack.pgsql.local
    image: postgres:18.4-alpine3.22@sha256:774521500f4c22761b25a6bdb772a0a3c2e8dd32468210bdad9231c5752ea398
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: sample
      POSTGRES_USER: sample
      POSTGRES_PASSWORD: sample
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - type: volume
        source: postgresql
        target: /var/lib/postgresql/data
      - type: bind
        source: ./local/db/script.sql
        target: /docker-entrypoint-initdb.d/script.sql
    healthcheck:
      test: [
        "CMD",
        "pg_isready",
        "-h",
        "laravelorbstack.pgsql.local",
        "-U",
        "sample",
        "-d",
        "sample",
        "-p",
        "5432",
      ]
      <<: *healthcheck-settings
    profiles:
      - app
      - cli

  mysql:
    networks:
      default:
        aliases:
          - laravelorbstack.mysql.local
    image: mysql:9.7.1@sha256:ad88e1c86cbf12ef52d0a0360cd4b774d22956c5ee9c565645fb019d7aacb6c3
    environment:
      MYSQL_ROOT_PASSWORD: sample
      MYSQL_DATABASE: sample
      MYSQL_USER: sample
      MYSQL_PASSWORD: sample
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - type: volume
        source: mysql
        target: /var/lib/mysql
    healthcheck:
      test: [
        "CMD",
        "mysqladmin",
        "ping",
        "-h",
        "laravelorbstack.mysql.local",
        "-u",
        "sample",
        "-psample",
        "-P",
        "3306",
      ]
      <<: *healthcheck-settings
    profiles:
      - app
      - cli
  cache:
    networks:
      default:
        aliases:
          - laravelorbstack.cache.local
    image: redis:8.4.4-alpine3.22@sha256:43092204f39bfd5500a4ee6d9a73105ba42157a6af8a80e6a51357400a46984b
    command: redis-server --appendonly yes
    volumes:
      - type: volume
        source: cache
        target: /data
    healthcheck:
      test: [
        "CMD",
        "redis-cli",
        "ping"
      ]
      <<: *healthcheck-settings
    profiles:
      - app
      - cli

  session:
    networks:
      default:
        aliases:
          - laravelorbstack.session.local
    image: redis:8.4.4-alpine3.22@sha256:43092204f39bfd5500a4ee6d9a73105ba42157a6af8a80e6a51357400a46984b
    command: redis-server --appendonly yes
    volumes:
      - type: volume
        source: session
        target: /data
    healthcheck:
      test: [
        "CMD",
        "redis-cli",
        "ping"
      ]
      <<: *healthcheck-settings
    profiles:
      - app
      - cli

  mail:
    networks:
      default:
        aliases:
          - laravelorbstack.mail.local
    image: axllent/mailpit:v1.30.3@sha256:956d688cbd13dca36c72d8e94c34d6d1cdf4a005aa6aa4ff6edaaac56c34d8df
    healthcheck:
      test: [
        "CMD",
        "ping",
        "-c",
        "3",
        "laravelorbstack.mail.local"
      ]
      <<: *healthcheck-settings
    profiles:
      - app
      - cli

  storage:
    networks:
      default:
        aliases:
          - laravelorbstack.storage.local
          - sample.laravelorbstack.storage.local
    image: rustfs/rustfs:1.0.0-alpha.80@sha256:224fbaa3512e5a299b2e096316a81226b9f5dc3cb1a7561c9660e80e179071bd
    volumes:
      - type: volume
        source: storage
        target: /data
    environment:
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:80
      RUSTFS_ACCESS_KEY: sample
      RUSTFS_SECRET_KEY: samplesample
      RUSTFS_SERVER_DOMAINS: laravelorbstack.storage.local:9000
    healthcheck:
      test: [
        "CMD",
        "curl",
        "-f",
        "http://laravelorbstack.storage.local:9000/health"
      ]
      <<: *healthcheck-settings

  setUpStorage:
    image: amazon/aws-cli:2.35.15@sha256:177c3f33d8b4b3d531a857b54289e8b101790ea9016c78431c417d8e681e7b2e
    depends_on:
      storage:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: sample
      AWS_SECRET_ACCESS_KEY: samplesample
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
    entrypoint: /bin/sh
    command: -c "aws --endpoint-url http://laravelorbstack.storage.local:9000 s3api create-bucket --bucket sample || true"
    profiles:
      - bucket

  php-rd:
    networks:
      default:
        aliases:
          - laravelorbstack.apache-rd.local
    hostname: php-rd
    image: laravelorbstack/php:apache-8.5-local
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - type: bind
        source: ..
        target: /var/www/html
      - type: bind
        source: ./local/php/mpm_prefork.conf
        target: /etc/apache2/mods-available/mpm_prefork.conf
      - type: bind
        source: ./local/php/rd-default.conf
        target: /etc/apache2/sites-available/000-default.conf
      - type: bind
        source: ./common/security.conf
        target: /etc/apache2/conf-available/security.conf
      - type: bind
        source: ./local/php/php.ini
        target: /usr/local/etc/php/php.ini
      - type: bind
        source: ./local/php/docker-php-ext-xdebug.ini
        target: /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    # .env.appをコンテナの環境変数に設定するようにしている。設定を変更する場合は、
    # 設定を変える場合は.env.appの内容を修正し、コンテナを再起動すること
    env_file: local/php/.env.rd
    depends_on:
      postgresql:
        condition: service_healthy
      mysql:
        condition: service_healthy
      cache:
        condition: service_healthy
      session:
        condition: service_healthy
      mail:
        condition: service_healthy
      storage:
        condition: service_healthy
    profiles:
      - customImage
      - app
  php-app:
    networks:
      default:
        aliases:
          - laravelorbstack.apache.local
    hostname: php-app
    image: laravelorbstack/php:apache-8.5-local
    volumes:
      - type: bind
        source: ..
        target: /var/www/html
      - type: bind
        source: ./local/php/mpm_prefork.conf
        target: /etc/apache2/mods-available/mpm_prefork.conf
      - type: bind
        source: ./local/php/000-default.conf
        target: /etc/apache2/sites-available/000-default.conf
      - type: bind
        source: ./common/security.conf
        target: /etc/apache2/conf-available/security.conf
      - type: bind
        source: ./local/php/php.ini
        target: /usr/local/etc/php/php.ini
      - type: bind
        source: ./local/php/docker-php-ext-xdebug.ini
        target: /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    # .env.appをコンテナの環境変数に設定するようにしている。設定を変更する場合は、
    # 設定を変える場合は.env.appの内容を修正し、コンテナを再起動すること
    env_file: local/php/.env.app
    depends_on:
      postgresql:
        condition: service_healthy
      mysql:
        condition: service_healthy
      cache:
        condition: service_healthy
      session:
        condition: service_healthy
      mail:
        condition: service_healthy
      storage:
        condition: service_healthy
    profiles:
      - customImage
      - app

  php-franken:
    networks:
      default:
        aliases:
          - laravelorbstack.franken.local
    hostname: php-franken
    image: laravelorbstack/php:franken-8.5-local
    volumes:
      - type: bind
        source: ..
        target: /app
      - type: volume
        source: caddy-data
        target: /data
      - type: volume
        source: caddy-config
        target: /config
      - type: bind
        source: ./local/php/php.ini
        target: /usr/local/etc/php/php.ini
      - type: bind
        source: ./local/php/docker-php-ext-xdebug-franken.ini
        target: /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    env_file: local/php/.env.franken
    depends_on:
      postgresql:
        condition: service_healthy
      mysql:
        condition: service_healthy
      cache:
        condition: service_healthy
      session:
        condition: service_healthy
      mail:
        condition: service_healthy
      storage:
        condition: service_healthy
    profiles:
      - customImage
      - app

  php-cli:
    env_file: local/php/.env.app
    image: laravelorbstack/php:apache-8.5-local
    volumes:
      - type: bind
        source: ..
        target: /var/www/html
      - type: bind
        source: ./local/php/000-default.conf
        target: /etc/apache2/sites-available/000-default.conf
      - type: bind
        source: ./local/php/mpm_prefork.conf
        target: /etc/apache2/mods-available/mpm_prefork.conf
      - type: bind
        source: ./local/php/php.ini
        target: /usr/local/etc/php/php.ini
      - type: bind
        source: ./local/php/docker-php-ext-xdebug.ini
        target: /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    profiles:
      - customImage
      - cli
    depends_on:
      postgresql:
        condition: service_healthy
      mysql:
        condition: service_healthy
      cache:
        condition: service_healthy
      session:
        condition: service_healthy
      mail:
        condition: service_healthy
      storage:
        condition: service_healthy
  balancer:
    networks:
      default:
        aliases:
          - frankenphp.local
          - apachephp.local
    hostname: balancer
    image: nginx:1.31.2@sha256:ec4ed8b5299e5e90694af7750eb6dffd2627317d30544d056b0371f8082f7bce
    volumes:
      - type: bind
        source: ./local/lb/nginx.orb.conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      php-app:
        condition: service_started
    labels:
      dev.orbstack.domains: frankenphp.local,apachephp.local
    profiles:
      - app
